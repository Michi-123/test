<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <h1>YouTube Video Editor</h1>
    </div>
    <div class="toolbar-center">
      <button id="btn-import" title="メディアをインポート">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        インポート
      </button>
      <div class="separator"></div>
      <button id="btn-add-video-track" title="動画トラック追加">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        動画トラック
      </button>
      <button id="btn-add-audio-track" title="音声トラック追加">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        音声トラック
      </button>
    </div>
    <div class="toolbar-right">
      <button id="btn-export" class="btn-primary" title="動画をエクスポート">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        エクスポート
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content">
    <!-- Left Panel: Media Library -->
    <aside id="media-library">
      <div class="panel-header">
        <h2>メディアライブラリ</h2>
      </div>
      <div id="media-list" class="panel-body">
        <div id="media-drop-zone" class="drop-zone">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>ファイルをドラッグ&ドロップ<br>またはクリックしてインポート</p>
          <small>.mov .png .m4a</small>
        </div>
      </div>
    </aside>

    <!-- Center: Preview -->
    <section id="preview-section">
      <div class="panel-header">
        <h2>プレビュー</h2>
        <span id="time-display">00:00.000 / 00:00.000</span>
      </div>
      <div id="preview-container">
        <canvas id="preview-canvas" width="1920" height="1080"></canvas>
      </div>
      <div id="transport-controls">
        <button id="btn-skip-start" title="先頭へ">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="btn-play" title="再生/停止">
          <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button id="btn-skip-end" title="末尾へ">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </section>

    <!-- Right Panel: Properties -->
    <aside id="properties-panel">
      <div class="panel-header">
        <h2>プロパティ</h2>
      </div>
      <div id="properties-body" class="panel-body">
        <div id="no-selection-msg">
          <p>クリップを選択してください</p>
        </div>
        <div id="clip-properties" style="display:none">
          <div class="prop-group">
            <label>クリップ名</label>
            <span id="prop-clip-name"></span>
          </div>
          <div class="prop-group">
            <label>種類</label>
            <span id="prop-clip-type"></span>
          </div>
          <div class="prop-group">
            <label>開始位置 (秒)</label>
            <input type="number" id="prop-start-time" step="0.1" min="0">
          </div>
          <div class="prop-group">
            <label>元の長さ (秒)</label>
            <span id="prop-original-duration"></span>
          </div>

          <!-- Trim Controls -->
          <div class="prop-section">
            <h3>トリミング</h3>
            <div class="prop-group">
              <label>トリム開始 (秒)</label>
              <input type="number" id="prop-trim-start" step="0.1" min="0">
            </div>
            <div class="prop-group">
              <label>トリム終了 (秒)</label>
              <input type="number" id="prop-trim-end" step="0.1" min="0">
            </div>
          </div>

          <!-- Image Duration (for PNG) -->
          <div class="prop-section" id="image-duration-section" style="display:none">
            <h3>画像表示設定</h3>
            <div class="prop-group">
              <label>表示時間 (秒)</label>
              <input type="number" id="prop-image-duration" step="0.5" min="0.5" value="5">
            </div>
          </div>

          <!-- Audio Controls -->
          <div class="prop-section" id="audio-controls-section" style="display:none">
            <h3>音声設定</h3>
            <div class="prop-group">
              <label>音量</label>
              <div class="slider-row">
                <input type="range" id="prop-volume" min="0" max="200" value="100">
                <span id="prop-volume-val">100%</span>
              </div>
            </div>
            <div class="prop-group">
              <label>フェードイン (秒)</label>
              <input type="number" id="prop-fade-in" step="0.1" min="0" value="0">
            </div>
            <div class="prop-group">
              <label>フェードアウト (秒)</label>
              <input type="number" id="prop-fade-out" step="0.1" min="0" value="0">
            </div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Timeline -->
  <section id="timeline-section">
    <div id="timeline-header">
      <div id="timeline-controls">
        <div class="zoom-control">
          <label>ズーム</label>
          <input type="range" id="timeline-zoom" min="10" max="300" value="100">
        </div>
      </div>
      <div id="timeline-ruler">
        <canvas id="ruler-canvas"></canvas>
      </div>
    </div>
    <div id="timeline-body">
      <div id="track-headers"></div>
      <div id="track-lanes">
        <div id="playhead-line"></div>
      </div>
    </div>
  </section>

  <!-- Hidden file input -->
  <input type="file" id="file-input" multiple accept=".mov,.mp4,.webm,.png,.jpg,.jpeg,.m4a,.mp3,.wav" style="display:none">

  <!-- Export Modal -->
  <div id="export-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h2>動画をエクスポート</h2>
      <div class="prop-group">
        <label>解像度</label>
        <select id="export-resolution">
          <option value="1920x1080">1920 x 1080 (Full HD)</option>
          <option value="1280x720">1280 x 720 (HD)</option>
          <option value="3840x2160">3840 x 2160 (4K)</option>
        </select>
      </div>
      <div class="prop-group">
        <label>フレームレート</label>
        <select id="export-fps">
          <option value="30">30 fps</option>
          <option value="60">60 fps</option>
          <option value="24">24 fps</option>
        </select>
      </div>
      <div id="export-progress" style="display:none">
        <div class="progress-bar">
          <div id="export-progress-fill" class="progress-fill"></div>
        </div>
        <p id="export-status">エクスポート準備中...</p>
      </div>
      <div class="modal-actions">
        <button id="btn-export-cancel" class="btn-secondary">キャンセル</button>
        <button id="btn-export-start" class="btn-primary">エクスポート開始</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
